<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VelvetBrew POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF0; }
        .bg-coffee { background-color: #4B2C20; }
        .text-coffee { color: #4B2C20; }
        .sidebar-item { transition: all 0.3s ease; border-radius: 12px; margin-bottom: 4px; color: #ffffff90; }
        .sidebar-item:hover { background-color: rgba(255,255,255,0.1); color: #fff; }
        .sidebar-active { background-color: white !important; color: #4B2C20 !important; font-weight: 700; }
        .category-active { background-color: #4B2C20 !important; color: white !important; box-shadow: 0 4px 12px rgba(75, 44, 32, 0.2); }
        .pay-btn-active { border-color: #4B2C20 !important; background-color: #FDFCF0; border-width: 3px; }
        .type-active { background-color: #4B2C20 !important; color: white !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4B2C20; border-radius: 10px; }
        
        /* New Custom Toast Notification Style */
        #customToast {
            visibility: hidden;
            min-width: 300px;
            background-color: #4B2C20;
            color: #fff;
            text-align: center;
            border-radius: 16px;
            padding: 16px;
            position: fixed;
            z-index: 2000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-weight: 600;
            font-size: 14px;
        }
        #customToast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div id="customToast"></div>

    <div class="w-64 bg-coffee flex flex-col p-6 shadow-2xl z-50">
        <div class="text-white text-2xl font-bold tracking-tighter mb-10 px-2 italic flex items-center gap-2">
            <i class="fa-solid fa-mug-hot"></i> VelvetBrew
        </div>
        <nav class="flex-1 space-y-2">
            <button onclick="showSection('dashboard')" class="nav-link sidebar-item w-full flex items-center gap-3 px-4 py-3 sidebar-active" data-section="dashboard">
                <i class="fa-solid fa-chart-line w-5"></i><span class="text-sm font-semibold">Dashboard</span>
            </button>
            <button onclick="showSection('pos')" class="nav-link sidebar-item w-full flex items-center gap-3 px-4 py-3" data-section="pos">
                <i class="fa-solid fa-cash-register w-5"></i><span class="text-sm font-semibold">Food Order</span>
            </button>
            <button onclick="showSection('history')" class="nav-link sidebar-item w-full flex items-center gap-3 px-4 py-3" data-section="history">
                <i class="fa-solid fa-receipt w-5"></i><span class="text-sm font-semibold">History</span>
            </button>
        </nav>
        <div class="mt-auto bg-white/10 p-4 rounded-2xl text-white/70 text-[10px]">
            <p class="uppercase tracking-widest font-bold mb-1">Master Barista</p>
            <p class="text-white text-sm font-bold">Thaw Zin Htet</p>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden relative">
        
        <div id="dashboardSection" class="flex-1 p-8 overflow-y-auto section custom-scrollbar">
            <header class="mb-10">
                <h1 class="text-4xl font-black text-coffee">Analytics</h1>
                <p class="text-gray-400 font-bold mt-1">Welcome back, Barista Thaw Zin!</p>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="statsContainer">
                <div class="bg-white p-8 rounded-[40px] shadow-sm border-b-[6px] border-coffee">
                    <span class="text-gray-400 font-bold text-[10px] uppercase tracking-widest">Total Sales</span>
                    <h2 id="dashRev" class="text-3xl font-black text-coffee mt-3">0 MMK</h2>
                </div>
                <div class="bg-white p-8 rounded-[40px] shadow-sm border-b-[6px] border-coffee">
                    <span class="text-gray-400 font-bold text-[10px] uppercase tracking-widest">Orders</span>
                    <h2 id="dashOrders" class="text-3xl font-black text-coffee mt-3">0</h2>
                </div>
                <div class="bg-white p-8 rounded-[40px] shadow-sm border-b-[6px] border-orange-400">
                    <span class="text-gray-400 font-bold text-[10px] uppercase tracking-widest">Avg. Bill</span>
                    <h2 id="dashAvg" class="text-3xl font-black text-orange-500 mt-3">0 MMK</h2>
                </div>
            </div>
            <div class="bg-white p-8 rounded-[40px] shadow-sm">
                <h3 class="font-bold text-coffee mb-6 flex items-center gap-2"><i class="fa-solid fa-bolt-lightning text-yellow-500"></i> Recent Activities</h3>
                <div id="recentActivity" class="space-y-4"></div>
            </div>
        </div>

        <div id="posSection" class="flex flex-1 overflow-hidden section hidden">
            <div class="flex-1 p-8 overflow-y-auto custom-scrollbar">
                <header class="flex justify-between items-end mb-10">
                    <div>
                        <h1 class="text-4xl font-black text-coffee tracking-tight">Velvet Menu</h1>
                        <p class="text-gray-400 font-bold text-sm">Pick the best coffee for Thaw Zin's customers</p>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        <input type="text" id="searchBar" onkeyup="renderMenu()" placeholder="Search flavor..." class="bg-white border-none rounded-[20px] pl-14 pr-6 py-4 shadow-sm w-80 outline-none focus:ring-4 focus:ring-coffee/5 transition-all">
                    </div>
                </header>

                <div class="flex gap-4 mb-10">
                    <button onclick="filterCat('all')" class="cat-btn px-10 py-3 bg-white text-coffee rounded-2xl text-xs font-black shadow-sm category-active" data-cat="all">All Items</button>
                    <button onclick="filterCat('coffee')" class="cat-btn px-10 py-3 bg-white text-coffee rounded-2xl text-xs font-black shadow-sm" data-cat="coffee">Coffee</button>
                    <button onclick="filterCat('bakery')" class="cat-btn px-10 py-3 bg-white text-coffee rounded-2xl text-xs font-black shadow-sm" data-cat="bakery">Bakery</button>
                    <button onclick="filterCat('dessert')" class="cat-btn px-10 py-3 bg-white text-coffee rounded-2xl text-xs font-black shadow-sm" data-cat="dessert">Desserts</button>
                </div>
                <div id="menuGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
            </div>

            <div class="w-[420px] bg-white shadow-[-20px_0_40px_rgba(0,0,0,0.02)] p-8 flex flex-col z-10">
                <h2 class="text-2xl font-black text-coffee tracking-tighter mb-8">Current Order</h2>
                <div class="flex gap-2 mb-8 bg-gray-100 p-1.5 rounded-[22px]">
                    <button onclick="setType('Dine In')" id="btnDineIn" class="type-btn flex-1 py-3 rounded-[18px] text-xs font-bold type-active">Dine In</button>
                    <button onclick="setType('Take Away')" id="btnTakeAway" class="type-btn flex-1 py-3 rounded-[18px] text-xs font-bold text-gray-500">Take Away</button>
                </div>
                <div id="cartItems" class="flex-1 overflow-y-auto custom-scrollbar space-y-3 mb-6"></div>
                <div class="border-t-2 border-dashed pt-6 space-y-6">
                   <div class="grid grid-cols-3 gap-3">

    <button onclick="setPay('Card')" class="pay-btn flex flex-col items-center gap-2 p-3 border-2 border-gray-50 rounded-2xl transition-all" data-pay="Card">
        <i class="fa-brands fa-cc-visa text-blue-800 text-xl"></i>
        <span class="text-[9px] font-black">Visa/Card</span>
    </button>
    <button onclick="setPay('Transfer')" class="pay-btn flex flex-col items-center gap-2 p-3 border-2 border-gray-50 rounded-2xl transition-all" data-pay="Transfer">
        <div class="w-8 h-8 bg-gray-100 rounded-lg flex items-center justify-center">
            <i class="fa-solid fa-building-columns text-coffee text-sm"></i>
        </div>
        <span class="text-[9px] font-black">Transfer</span>
    </button>
    <button onclick="setPay('Cash')" class="pay-btn flex flex-col items-center gap-2 p-3 border-2 border-gray-50 rounded-2xl transition-all" data-pay="Cash">
        <i class="fa-solid fa-money-bill-1-wave text-green-600 text-xl"></i>
        <span class="text-[9px] font-black">Cash</span>
    </button>
</div>
                    <div class="flex justify-between items-center"><span class="text-gray-400 font-bold">Total Bill</span><span id="finalTotal" class="text-4xl font-black text-coffee">0 MMK</span></div>
                    <button onclick="placeOrder()" class="w-full bg-coffee text-white py-5 rounded-[28px] font-black text-lg shadow-xl active:scale-95 transition-all">Complete Order</button>
                </div>
            </div>
        </div>

        <div id="historySection" class="flex-1 p-10 section hidden overflow-y-auto">
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-4xl font-black text-coffee tracking-tight">Order Logs</h1>
                <button onclick="clearAllHistory()" class="bg-red-50 text-red-500 text-xs font-black px-6 py-3 rounded-2xl hover:bg-red-500 hover:text-white transition-all">Wipe Records</button>
            </div>
            <div id="historyList" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </div>
    </div>

    <div id="receiptModal" class="fixed inset-0 bg-coffee/60 backdrop-blur-md hidden flex items-center justify-center z-[1000]">
        <div class="bg-white p-12 rounded-[50px] w-[400px] text-center shadow-2xl">
            <h2 class="text-3xl font-black text-coffee mb-2 italic">VelvetBrew</h2>
            <div id="rItems" class="border-y-2 border-dashed py-6 mb-6 text-left space-y-3"></div>
            <div class="flex justify-between font-black text-2xl text-coffee mb-10 px-2"><span>TOTAL</span><span id="rTotal"></span></div>
            <button onclick="$('#receiptModal').fadeOut()" class="w-full bg-coffee text-white py-5 rounded-[25px] font-black text-lg shadow-lg">Close</button>
        </div>
    </div>

    <script>
        // Data & Products
        const products = [
            { id: 1, name: 'Velvet Latte', price: 4500, cat: 'coffee', image: "https://i.pinimg.com/736x/57/3d/94/573d943706216c0960d53ac86eba162f.jpg" },
            { id: 2, name: 'Espresso Single', price: 3000, cat: 'coffee', image: "https://i.pinimg.com/736x/4c/28/e2/4c28e2420bf38c50120dba0cbaf42e8d.jpg" },
            { id: 3, name: 'Cloud Croissant', price: 3800, cat: 'bakery', image: "https://i.pinimg.com/1200x/bc/46/27/bc462749ac56b9bb171d80296e51fa16.jpg" },
            { id: 4, name: 'NY Cheese Cake', price: 6500, cat: 'dessert', image: "https://i.pinimg.com/236x/42/74/bc/4274bc063dd9d4b05f07c70ac942fc64.jpg" },
            { id: 5, name: 'Matcha Bliss', price: 5200, cat: 'coffee', image: "https://i.pinimg.com/1200x/20/60/94/206094e67a87b5eea58a9f7be2c20827.jpg" },
            { id: 6, name: 'Apple Almond Danish', price: 4200, cat: 'bakery', image: "https://i.pinimg.com/736x/19/f0/f9/19f0f91913343cb95d30c9bc4072cd59.jpg" },
            { id: 7, name: 'Tiramisu Cup', price: 6000, cat: 'dessert', image: "https://i.pinimg.com/736x/7e/16/53/7e16530436f976e540c3e9fa09f4d4ee.jpg" },
            { id: 8, name: 'Cold Brew', price: 4200, cat: 'coffee', image: "https://i.pinimg.com/1200x/a0/8b/61/a08b618b6bbe45c5f3ae62ffdaff1d7d.jpg" }
        ];

        let cart = [];
        let sales = JSON.parse(localStorage.getItem('vb_final_pro_sales')) || [];
        let orderType = 'Dine In';
        let paymentMethod = '';
        let currentCat = 'all';

        // NEW: Toast Notification Function
        function showToast(msg) {
            const toast = document.getElementById("customToast");
            toast.innerHTML = `<i class="fa-solid fa-circle-info mr-2"></i> ${msg}`;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function showSection(id) {
            $('.section').addClass('hidden');
            $(`#${id}Section`).removeClass('hidden');
            $('.nav-link').removeClass('sidebar-active');
            $(`.nav-link[data-section="${id}"]`).addClass('sidebar-active');
            if(id === 'dashboard') updateDashboard();
            if(id === 'history') renderHistory();
        }

        function filterCat(cat) {
            currentCat = cat;
            $('.cat-btn').removeClass('category-active');
            $(`.cat-btn[data-cat="${cat}"]`).addClass('category-active');
            renderMenu();
        }

        function renderMenu() {
    const search = $('#searchBar').val().toLowerCase();
    $('#menuGrid').empty();
    
    products.filter(p => (currentCat === 'all' || p.cat === currentCat) && p.name.toLowerCase().includes(search))
    .forEach(p => {
        $('#menuGrid').append(`
            <div onclick="addToCart(${p.id})" class="bg-white p-6 rounded-[40px] shadow-sm hover:shadow-2xl cursor-pointer active:scale-95 transition-all">
                
                <div class="aspect-square bg-gray-50 rounded-[30px] mb-5 overflow-hidden flex items-center justify-center">
                    ${p.image ? 
                        `<img src="${p.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">` : 
                        `<span class="font-black text-gray-200 text-6xl">${p.name[0]}</span>`
                    }
                </div>

                <h3 class="font-black text-coffee text-lg leading-tight mb-1">${p.name}</h3>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-orange-500 font-black">${p.price.toLocaleString()} MMK</span>
                    <span class="bg-gray-100 text-[9px] font-bold uppercase px-3 py-1 rounded-full text-gray-400">${p.cat}</span>
                </div>
            </div>
        `);
    });
        }

        function setType(t) {
            orderType = t;
            $('.type-btn').removeClass('type-active text-white').addClass('text-gray-500');
            t === 'Dine In' ? $('#btnDineIn').addClass('type-active').removeClass('text-gray-500') : $('#btnTakeAway').addClass('type-active').removeClass('text-gray-500');
        }

        function setPay(m) {
            paymentMethod = m;
            $('.pay-btn').removeClass('pay-btn-active');
            $(`.pay-btn[data-pay="${m}"]`).addClass('pay-btn-active');
        }

        function addToCart(id) {
            let p = products.find(i => i.id === id);
            let exist = cart.find(i => i.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            renderCart();
        }

        function renderCart() {
            $('#cartItems').empty();
            let total = 0;
            cart.forEach((item, idx) => {
                total += item.price * item.qty;
                $('#cartItems').append(`
                    <div class="flex justify-between items-center bg-gray-50 p-5 rounded-[25px] font-bold text-coffee">
                        <span class="text-xs font-black">${item.name} x${item.qty}</span>
                        <button onclick="remove(${idx})" class="text-red-400">×</button>
                    </div>
                `);
            });
            $('#finalTotal').text(total.toLocaleString() + ' MMK');
        }

        function remove(i) { cart.splice(i, 1); renderCart(); }

        function placeOrder() {
        
            if(!cart.length) return showToast("Your cart is empty!");
            if(!paymentMethod) return showToast("Please select a payment method!");

            const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
            const order = { uid: Date.now(), id: '#VB-'+Math.floor(1000 + Math.random()*9000), items: [...cart], total, pay: paymentMethod, type: orderType, date: new Date().toLocaleString() };
            sales.push(order);
            localStorage.setItem('vb_final_pro_sales', JSON.stringify(sales));

            $('#rItems').html(order.items.map(i=>`<div class="flex justify-between text-xs font-bold text-coffee"><span>${i.name} (x${i.qty})</span><span>${(i.price*i.qty).toLocaleString()}</span></div>`).join(''));
            $('#rTotal').text(total.toLocaleString() + ' MMK');
            $('#receiptModal').css('display', 'flex').hide().fadeIn();
            
            cart = []; renderCart(); paymentMethod = ''; $('.pay-btn').removeClass('pay-btn-active');
            updateDashboard();
        }

       
        function updateDashboard() {
            let total = sales.reduce((s,o)=>s+o.total,0);
            $('#dashRev').text(total.toLocaleString() + ' MMK');
            $('#dashOrders').text(sales.length);
            $('#dashAvg').text(sales.length ? Math.round(total/sales.length).toLocaleString() + ' MMK' : '0 MMK');
            
            $('#recentActivity').empty();
            sales.slice(-5).reverse().forEach(o => {
                $('#recentActivity').append(`<div class="flex justify-between border-b pb-3 text-sm font-bold text-coffee"><span>${o.id}</span><span>${o.total.toLocaleString()} MMK</span></div>`);
            });
        }

        function renderHistory() {
    $('#historyList').empty();
    sales.slice().reverse().forEach((o) => {
        $('#historyList').append(`
            <div class="bg-white p-6 rounded-[30px] border-l-[10px] border-coffee flex justify-between items-center shadow-sm">
                <div>
                    <h4 class="font-black text-coffee">${o.id}</h4>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">${o.date}</p>
                </div>
                <div class="flex items-center gap-4">
                    <p class="font-black text-coffee">${o.total.toLocaleString()} MMK</p>
                    <button onclick="deleteOrder(${o.uid})" class="text-gray-300 hover:text-red-500">
                        <i class="fa-solid fa-circle-xmark text-xl"></i>
                    </button>
                </div>
            </div>
        `);
    });
} // 

function deleteOrder(uid) {
    if(confirm("Are you sure you want to delete this record?")) {
        sales = sales.filter(o => o.uid !== uid);
        localStorage.setItem('vb_final_pro_sales', JSON.stringify(sales));
        renderHistory();
        updateDashboard();
        showToast("Order record deleted!");
    }
}

function clearAllHistory() {
    if(confirm("Are you sure you want to wipe all records?")) {
        sales = [];
        localStorage.setItem('vb_final_pro_sales', JSON.stringify(sales));
        renderHistory();
        updateDashboard();
        showToast("All history cleared!");
    }
}


        $(document).ready(() => { renderMenu(); updateDashboard(); });
    </script>
</body>
</html>
